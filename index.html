<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Hyphen8 Documentation</title>
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
		<meta name="description" content="Description">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
		<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate">
		<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"/>
		<!--<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css" />-->
		<!--<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/buble.css" />-->
		<!--<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css" />-->
		<!--<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/pure.css" />-->
	</head>
	<body>
  		<div id="app"></div>
		<script>
			window.$docsify = {
				name: 'Documentation',
				repo: "https://github.com/HYPHENATE/SimpleTags/",
				homepage: "README.md",
				loadNavbar: false,
				loadSidebar: true,
				subMaxLevel: 3,
				auto2top: true,
				coverpage: false,
				search: {
					maxAge: 86400000,
					paths: "auto",
					placeholder: "Search docs...",
					noData: "No results found.",
					depth: 6
				},
				copyCode: {
					buttonText: "Copy",
					errorText: "Error",
					successText: "Copied!"
				},
				pagination: {
					previousText: "Previous",
					nextText: "Next",
					crossChapter: true
				}
			}
		</script>
		<!-- Docsify v4 -->
		<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
		<!-- Plugins -->
		<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
		<script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
		<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
		<!-- Syntax highlighting -->
		<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
	</body>
</html>
